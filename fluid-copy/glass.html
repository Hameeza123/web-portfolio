<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLASS — Hamza Hussain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f7f4ee; --ink:#111; --line:rgba(17,17,17,0.14); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; background: var(--bg); color: var(--ink); font-family: 'Archivo', sans-serif; }
    main {
      width: min(920px, calc(100vw - 32px));
      margin: 36px auto;
      border: 1px solid var(--line);
      background: #fff;
      padding: clamp(24px, 4vw, 46px);
    }
    h1 {
      font-family: 'Zalando Sans Expanded', sans-serif;
      color: maroon;
      letter-spacing: 0.03em;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      margin-bottom: 10px;
    }
    p { line-height: 1.65; }
    a {
      display: inline-block;
      margin-top: 20px;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
      padding: 8px 12px 7px;
    }
  </style>
</head>
<body>
  <main>
    <h1>GLASS</h1>
    <p>Coming soon.</p>
    <a href="landing.html">Back to Landing</a>
  </main>
</body>
</html>
