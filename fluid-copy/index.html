<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamza Hussain / Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --bg: #fefdfb;
      --accent: maroon;
      --water-gradient-stop1: rgba(89, 137, 154, 0.35); /* APPLESAUCE */
      --water-gradient-stop2: rgba(100, 121, 134, 0.55);
      --water-gradient-stop3: rgba(101, 133, 163, 0.75);
      --water-gradient-stop4: rgba(95, 115, 138, 0.80);
      --water-gradient-stop5: rgba(89, 108, 128, 0.85);
      --water-gradient-stop6: rgb(91, 104, 130);
    }
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; background: var(--bg); }

    /* ── Canvas ── */
    .water-wrap {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 0;
    }
    #fluid-canvas { width:100%; height:100%; display:block; }

    /* ── Topbar ── */
    .topbar {
      position: absolute;
      top: 18px;
      left: 0; right: 0;
      padding: 0 clamp(18px,4vw,32px);
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #0f0f0f;
      z-index: 3;
      font-family: 'Space Mono', monospace;
    }
    .topbar nav { display: flex; gap: 16px; }
    .topbar a { color: #0f0f0f; text-decoration: none; position: relative; }
    .topbar .wordmark { font-family: 'Archivo', sans-serif; font-weight: 400; }
    .topbar a::after, .wordmark::after {
      content: '';
      position: absolute;
      left: 0; bottom: -4px;
      height: 1px; width: 100%;
      background: #0f0f0f;
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 180ms ease;
    }
    .topbar a:hover::after, .wordmark:hover::after { transform: scaleX(1); }

    .divider {
      position: absolute;
      top: 52px; left: 0; right: 0;
      height: 1px;
      background: rgba(0,0,0,0.08);
      z-index: 2;
    }

    /* ── Main content block ── */
    .content {
      position: absolute;
      top: 96px;
      left: 0; right: 0;
      padding: 0 clamp(18px, 4vw, 32px);
      max-width: 1320px;
      margin: 0 auto;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.8rem;
      color: #6a675f;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeIn 500ms ease 400ms both;
    }

    /* ── Heading ── */
    .hero-h1 {
      margin: 0;
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.8rem, 6vw, 3.8rem);
      letter-spacing: 0.01em;
      line-height: 1.15;
      font-weight: 400;
      color: #0f0f0f;
    }
    .dot { color: var(--accent); margin-left: 3px; }

    .ph {
      display: inline;
      opacity: 0;
      /* inline elements can't transform; wrap in inline-block trick via wrapper */
    }
    .ph-w {
      display: inline;
      opacity: 0;
      animation: fadeIn 600ms ease both;
    }
    .ph-w:nth-child(1) { animation-delay: 650ms; }
    .ph-w:nth-child(2) { animation-delay: 820ms; }
    .ph-w:nth-child(3) { animation-delay: 1020ms; }
    .ph-w:nth-child(4) { animation-delay: 1190ms; }
    .ph-w:nth-child(5) { animation-delay: 1390ms; }
    .ph-w:nth-child(6) { animation-delay: 1560ms; }
    .ph-w:nth-child(7) { animation-delay: 1730ms; }
    .ph-w:nth-child(8) { animation-delay: 1900ms; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── Nav links in heading ── */
    .hero-link {
      color: inherit;
      text-decoration: none;
      display: inline;
      transition: color 180ms ease;
      pointer-events: all;
    }
    .hero-link:hover {
      color: var(--accent);
    }

    /* ── Nujabes accent ── */
    .nujabes-accent {
      position: fixed;
      top: 52px;
      right: 0;
      height: calc(100vh - 52px);
      width: auto;
      transform: scaleX(-1);
      opacity: 0.13;
      z-index: 1;
      pointer-events: none;
      object-fit: contain;
      object-position: top right;
      clip-path: inset(0 0 260px 0);
    }

    /* ── Responsive ── */
    @media (max-width: 760px) {
      .hero-h1 { font-size: clamp(2rem, 6.4vw, 3rem); }
    }
    @media (max-height: 600px) {
      .hero-h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); }
    }
  </style>
</head>
<body>
  <div class="water-wrap" aria-hidden="true">
    <canvas id="fluid-canvas"></canvas>
  </div>
  <img class="nujabes-accent" src="photos/landing/nujabes.jpg" alt="" aria-hidden="true" />

  <header class="topbar">
    <a class="wordmark" href="landing.html">Hamza Hussain</a>
    <nav>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="glass.html">GLASS</a>
    </nav>
  </header>
  <div class="divider"></div>

    <div class="content">
      <div class="eyebrow">Portfolio /</div>
      <h1 class="hero-h1">
        <span class="ph-w"><a class="hero-link" href="projects.html">computational math</a></span><span class="ph-w"><span class="dot">•</span> </span><span class="ph-w"><a class="hero-link" href="projects.html">physics-informed interactions</a></span><span class="ph-w"><span class="dot">•</span> </span><span class="ph-w"><a class="hero-link" href="glass.html">global anthropology</a></span><span class="ph-w"><span class="dot">•</span> </span><span class="ph-w"><a class="hero-link" href="about.html">lifelong learning</a></span><span class="ph-w"><span class="dot">•</span></span>
      </h1>
    </div>

  <script src="fluid-simulation.js"></script>
  <script>
    function loop() {
      window.FluidSimulation.step();
      window.FluidSimulation.draw();
      requestAnimationFrame(loop);
    }
    window.addEventListener('DOMContentLoaded', () => {
      window.FluidSimulation.init();
      loop();

      // Idle auto-drops when no interaction
      let lastInteraction = Date.now();
      const c = document.getElementById('fluid-canvas');
      ['mousemove','mousedown','touchstart','touchmove'].forEach(e =>
        c.addEventListener(e, () => { lastInteraction = Date.now(); }, { passive: true })
      );
      function idleDrop() {
        if (Date.now() - lastInteraction > 1400) {
          const canvas = window.FluidSimulation.getCanvas();
          if (canvas) {
            const count = 1 + Math.floor(Math.random() * 2);
            for (let i = 0; i < count; i++) {
              const dropX = (0.1 + Math.random() * 0.8) * canvas.width;
              window.FluidSimulation.addDisturbance(dropX, 0);
              createSplash(dropX);
            }
          }
        }
        setTimeout(idleDrop, 1800 + Math.random() * 2000);
      }
      setTimeout(idleDrop, 3200);
    });
  </script>
</body>
</html>
