<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamza Hussain — Water Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Archivo:wght@300;400;500&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root { --bg: #ffffff; --accent: maroon; }
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; background: var(--bg); }

    .hero {
      position: absolute;
      top: 96px;
      left: 0;
      right: 0;
      padding: 0 clamp(18px, 4vw, 32px);
      max-width: 1320px;
      margin: 0 auto;
      font-family: 'Space Grotesk','Archivo',sans-serif;
      color: #0f0f0f;
      pointer-events: none;
      z-index: 2;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(2.8rem, 6vw, 3.8rem);
      letter-spacing: 0.01em;
      line-height: 1.15;
      font-weight: 600;
    }

    .dot { color: var(--accent); margin-left: 4px; }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size:0.8rem;
      color: #6a675f;
      margin-bottom: 6px;
    }

    .topbar {
      position:absolute;
      top:18px;
      left:0;
      right:0;
      padding: 0 clamp(18px,4vw,32px);
      max-width:1320px;
      margin:0 auto;
      display:flex;
      justify-content: space-between;
      align-items:center;
      font-size:0.95rem;
      text-transform: uppercase;
      letter-spacing:0.2em;
      color:#0f0f0f;
      z-index:3;
      font-family:'Archivo', 'Helvetica Neue',sans-serif;
    }
    .topbar nav { display:flex; gap:16px; }
    .topbar a { color:#0f0f0f; text-decoration:none; position:relative; }
    .topbar a::after, .wordmark::after {
      content:'';
      position:absolute;
      left:0;
      bottom:-4px;
      height:1px;
      width:100%;
      background:#0f0f0f;
      transform-origin:left;
      transform:scaleX(0);
      transition:transform 180ms ease;
    }
    .topbar a:hover::after, .wordmark:hover::after { transform:scaleX(1); }

    .divider {
      position:absolute;
      top:52px;
      left:0;
      right:0;
      height:1px;
      background: rgba(0,0,0,0.08);
      z-index:2;
    }

    .water-wrap {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow:hidden;
      background: var(--bg);
    }
    #fluid-canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

    .portal-dock {
      position: absolute;
      left: clamp(18px, 4vw, 32px);
      right: clamp(18px, 4vw, 32px);
      top: 56%;
      bottom: auto;
      transform: translateY(-50%);
      z-index: 4;
      display: flex;
      gap: clamp(28px, 7vw, 120px);
      justify-content: center;
      overflow-x: auto;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
    }
    .portal-dock::-webkit-scrollbar { height: 8px; }
    .portal-dock::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 999px; }

    .portal-card {
      position: relative;
      flex: 0 0 clamp(108px, 16vw, 220px);
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      color: #ffffff;
      overflow: hidden;
      background: #222;
      opacity: 0;
      transform: translateY(14px) scale(0.985);
      animation: portalIn 900ms cubic-bezier(.22,.9,.32,1) forwards;
    }
    .portal-card:nth-child(1) { animation-delay: 900ms; }
    .portal-card:nth-child(2) { animation-delay: 1650ms; }
    .portal-card:nth-child(3) { animation-delay: 2400ms; }
    .portal-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 260ms ease;
    }
    .portal-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.66), rgba(0,0,0,0.18));
      z-index: 1;
      opacity: 0;
      transition: opacity 220ms ease;
    }
    .portal-card:hover img { transform: scale(1.03); }
    .portal-card:hover::before,
    .portal-card:focus-visible::before { opacity: 1; }

    .portal-label {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      z-index: 2;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 220ms ease, transform 220ms ease;
      pointer-events: none;
    }
    .portal-card:hover .portal-label,
    .portal-card:focus-visible .portal-label {
      opacity: 1;
      transform: translateY(0);
    }
    .portal-label h2 {
      margin: 0 0 3px;
      font-family: 'Zalando Sans Expanded', sans-serif;
      font-size: clamp(0.92rem, 1.7vw, 1.1rem);
      letter-spacing: 0.03em;
    }
    .portal-label p {
      margin: 0;
      font-family: 'Archivo', sans-serif;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.9;
    }

    @keyframes portalIn {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 760px) {
      .hero h1 { font-size: clamp(2rem, 6.4vw, 3rem); }
      .portal-card { flex-basis: clamp(110px, 34vw, 170px); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="wordmark" href="landing.html">Hamza Hussain</a>
    <nav class="nav-links">
      <a href="mailto:hello@hamzahussain.com">Email</a>
      <a href="https://www.linkedin.com" target="_blank" rel="noreferrer">LinkedIn</a>
    </nav>
  </header>
  <div class="divider"></div>

  <div class="hero">
    <div class="eyebrow">Portfolio /</div>
    <h1>computational math<span class="dot">•</span> physics-informed interactions<span class="dot">•</span> global anthropology<span class="dot">•</span></h1> 
  </div>

  <div class="water-wrap" aria-hidden="true">
    <canvas id="fluid-canvas"></canvas>
  </div>

  <section class="portal-dock" aria-label="Site sections">
    <a class="portal-card" href="about.html">
      <img src="2FA1A268-BED9-4A4A-8495-936F20172BDA.JPG" alt="About me section" />
      <div class="portal-label">
        <h2>About Me</h2>
        <p>Resume + Education</p>
      </div>
    </a>

    <a class="portal-card" href="projects.html">
      <img src="Wendelstein-7-AS-is-an-advanced-stellarator-fusion-experiment-with-modular-magnetic-field.png" alt="Projects section" />
      <div class="portal-label">
        <h2>Projects</h2>
        <p>Work + Research</p>
      </div>
    </a>

    <a class="portal-card" href="glass.html">
      <img src="IMG_6368.jpeg" alt="GLASS section" />
      <div class="portal-label">
        <h2>GLASS</h2>
        <p>Leadership + Story</p>
      </div>
    </a>
  </section>

  <script src="fluid-simulation.js"></script>
  <script>
    function loop(){
      window.FluidSimulation.step();
      window.FluidSimulation.draw();
      requestAnimationFrame(loop);
    }
    window.addEventListener('DOMContentLoaded', () => {
      window.FluidSimulation.init();
      loop();
    });
  </script>
</body>
</html>
