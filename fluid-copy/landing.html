<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamza Hussain / Landing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #0f0f0f;
      --accent: #e6392f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    body { display: flex; align-items: stretch; justify-content: flex-start; position: relative; }
    img.full {
      height: 100vh; width: auto; object-fit: contain; display: block;
    }

    .text-stack {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      color: var(--ink);
      z-index: 2;
      max-width: 60vw;
      font-family: 'Space Mono', monospace;
    }
    .text-main {
      position: relative;
      display: inline-block;
      font-family: 'Lora', serif;
      font-size: clamp(4.0rem, 5vw, 4.8rem);
      letter-spacing: 0.03em;
      line-height: 1.15;
      text-align: right;
      white-space: nowrap;
      color: maroon;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeSlide 0.8s ease forwards;
      animation-delay: 1s;
    }
    .subtext {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1rem, 3vw, 1.1rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
      color: var(--ink);
      text-decoration: none;
      padding: 4px 0;
      overflow: visible;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeSlide 0.8s ease forwards;
      animation-delay: 2s;
    }
    .subtext::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      height: 1px;
      width: 100%;
      background: var(--ink);
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 180ms ease;
    }
    .subtext:hover::after { transform: scaleX(1); }

    .text-stack { animation: floaty 7s ease-in-out infinite; }
    @keyframes floaty {
      0% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
      100% { transform: translateY(0); }
    }

    @media (min-aspect-ratio: 16/10) {
      .text-stack { top: 50%; transform: translateY(-50%); bottom: auto; right: 150px; align-items: flex-end; }
    }
    @media (max-aspect-ratio: 16/10) and (min-aspect-ratio: 1/1) {
      .text-stack { top: auto; transform: none; bottom: 200px; right: 200px; align-items: flex-end; }
    }
    @media (max-aspect-ratio: 1/1) {
      .text-stack {
        top: auto;
        transform: none;
        bottom: 90px;
        left: 25%; right: auto;
        align-items: center;
        gap: 4px;
        animation: floaty 6s ease-in-out infinite;
        transform: translateX(-50%);
      }
      .text-main { text-align: center; font-size: clamp(3rem, 6vw, 2.3rem); white-space: nowrap; }
      .subtext { text-align: center; }
    }

    @keyframes blink { 50% { background: transparent; } }
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <img class="full" src="photos/landing/nujabes.jpg" alt="Nujabes" />
  <div class="text-stack">
    <div class="text-main">Hamza&nbsp;Hussain</div>
    <a class="subtext" href="index.html">view my work</a>
  </div>
</body>
</html>
